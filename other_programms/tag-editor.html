<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор тегов для настольных игр</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .progress-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.3s ease;
        }

        .game-section {
            padding: 30px;
        }

        .game-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .game-header {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .game-image {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .game-image-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #6c757d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .game-info {
            flex: 1;
        }

        .game-name {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .game-details {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c757d;
            font-size: 1em;
        }

        .game-description {
            color: #6c757d;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .tags-section {
            margin: 25px 0;
        }

        .section-title {
            font-size: 1.2em;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .tag-category {
            margin-bottom: 25px;
        }

        .category-title {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 600;
            padding-bottom: 5px;
            border-bottom: 2px solid #e9ecef;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tag {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9em;
            user-select: none;
        }

        .tag:hover {
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .tag.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-skip {
            background: #ff9800;
            color: white;
        }

        .btn-skip:hover {
            background: #f57c00;
            transform: translateY(-2px);
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .export-section {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            text-align: center;
        }

        .current-tags {
            margin: 15px 0;
            min-height: 40px;
        }

        .current-tag {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px;
            font-size: 0.9em;
        }

        .skipped-games {
            margin-top: 10px;
            font-size: 0.9em;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .game-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .game-image, .game-image-placeholder {
                width: 100%;
                height: 200px;
            }
            
            .game-details {
                flex-direction: column;
                gap: 10px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Редактор тегов для игр</h1>
            <p>Разметь теги для своей коллекции настольных игр</p>
        </div>

        <div class="progress-section">
            <div id="progress-text">Загрузка игр...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div id="skipped-counter" class="skipped-games">Неизвестных игр: 0</div>
        </div>

        <div class="game-section">
            <div class="game-card">
                <div class="game-header">
                    <div id="game-image-container">
                        <!-- Картинка игры будет здесь -->
                    </div>
                    <div class="game-info">
                        <div class="game-name" id="game-name">Название игры</div>
                        <div class="game-details" id="game-details">
                            <!-- Детали игры -->
                        </div>
                        <div class="game-description" id="game-description">
                            <!-- Описание игры -->
                        </div>
                    </div>
                </div>
                
                <div class="current-tags" id="current-tags">
                    <!-- Выбранные теги -->
                </div>

                <div class="tags-section">
                    <div class="section-title">🏷️ Выбери теги для этой игры:</div>
                    <div id="tags-categories-container"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-skip" onclick="skipAsUnknown()">🤷 Не знаю/Не играл</button>
                    <button class="btn btn-secondary" onclick="skipGame()">⏭️ Пропустить</button>
                    <button class="btn btn-primary" onclick="nextGame()">✅ Следующая игра</button>
                </div>
            </div>
        </div>

        <div class="export-section">
            <div class="section-title">💾 Экспорт данных</div>
            <p>Когда закончишь, скачай файл и положи в <code>assets/data/game-tags.json</code></p>
            <button class="btn btn-download" onclick="downloadJSON()">📥 Скачать game-tags.json</button>
        </div>
    </div>

    <script>
        // СТРУКТУРИРОВАННЫЕ ТЕГИ ПО ГРУППАМ
        const TAGS_BY_CATEGORY = {
            "🎯 Тип игры": {
                tags: [
                    'eurogame', 'ameritrash', 'hybrid', 'abstract', 
                    'partygame', 'wargame', 'gateway', 'дополнение'
                ]
            },
            "🎭 Тематика": {
                tags: [
                    'fantasy', 'sci-fi', 'historical', 'horror', 'detective',
                    'ancient', 'medieval', 'cyberpunk', 'space', 'farm'
                ]
            },
            "⚙️ Механики": {
                tags: [
                    'deckbuilding', 'meepleplacement', 'card-driven', 'dice-rolling',
                    'area-control', 'set-collection', 'tile-placement', 'auction',
                    'bluffing', 'drafting', 'trading', 'engine-building'
                ]
            },
            "👥 Взаимодействие": {
                tags: [
                    'cooperative', 'competitive', 'one-vs-all', 'team-based',
                    'hidden-roles', 'minimal-interaction'
                ]
            },
            "📦 Особенности": {
                tags: [
                    'compact', 'humor', 'asymmetric', 'modular-board',
                    'campaign', 'legacy', 'solo', 'duel', 'scalable'
                ]
            },
            "🎪 Жанры": {
                tags: [
                    '4x-strategy', 'pick-up-deliver', 'push-your-luck', 'social-deduction'
                ]
            }
        };

        let allGames = [];
        let currentIndex = 0;
        let gameTags = {};
        let unknownGames = [];

        // Загружаем игры при старте
        async function loadGames() {
            try {
                const response = await fetch('./assets/data/tesera-collection.json');
                allGames = await response.json();
                updateProgress();
                loadGame(currentIndex);
            } catch (error) {
                document.getElementById('progress-text').textContent = '❌ Ошибка загрузки игр';
                console.error('Ошибка:', error);
            }
        }

        function loadGame(index) {
            if (index >= allGames.length) {
                document.getElementById('game-name').textContent = '🎉 Все игры размечены!';
                document.getElementById('game-details').innerHTML = '';
                document.getElementById('game-description').innerHTML = '';
                document.getElementById('tags-categories-container').innerHTML = '';
                document.getElementById('game-image-container').innerHTML = '';
                return;
            }

            const game = allGames[index];
            
            // Обновляем картинку игры
            const imageContainer = document.getElementById('game-image-container');
            if (game.imageUrl) {
                imageContainer.innerHTML = `
                    <img src="${game.imageUrl}" alt="${game.name}" class="game-image" 
                         onerror="this.style.display='none'; document.getElementById('image-placeholder').style.display='flex'">
                    <div id="image-placeholder" class="game-image-placeholder" style="display: none;">🎮</div>
                `;
            } else {
                imageContainer.innerHTML = '<div class="game-image-placeholder">🎮</div>';
            }

            // Обновляем информацию об игре
            document.getElementById('game-name').textContent = game.name;
            document.getElementById('game-details').innerHTML = `
                <div class="info-item">👥 ${game.players || '—'}</div>
                <div class="info-item">⏱ ${game.duration || '—'}</div>
                <div class="info-item">⭐ ${game.rating ? parseFloat(game.rating).toFixed(1) : '—'}</div>
                <div class="info-item">📅 ${game.year || '—'}</div>
            `;

            // Описание игры
            const description = document.getElementById('game-description');
            if (game.description) {
                description.textContent = game.description.length > 200 
                    ? game.description.substring(0, 200) + '...' 
                    : game.description;
            } else {
                description.textContent = 'Описание отсутствует';
            }

            // Рендерим теги по группам
            renderTagCategories(game.name);
            updateProgress();
        }

        function renderTagCategories(gameName) {
            const container = document.getElementById('tags-categories-container');
            const currentTagsContainer = document.getElementById('current-tags');
            
            // Очищаем контейнеры
            container.innerHTML = '';
            currentTagsContainer.innerHTML = '';
            
            // Показываем выбранные теги
            const selectedTags = gameTags[gameName] || [];
            if (selectedTags.length > 0) {
                selectedTags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'current-tag';
                    tagElement.textContent = tag;
                    currentTagsContainer.appendChild(tagElement);
                });
            } else {
                currentTagsContainer.innerHTML = '<em>Теги еще не выбраны</em>';
            }

            // Рендерим теги по категориям
            Object.entries(TAGS_BY_CATEGORY).forEach(([categoryName, category]) => {
                const categoryElement = document.createElement('div');
                categoryElement.className = 'tag-category';
                
                const titleElement = document.createElement('div');
                titleElement.className = 'category-title';
                titleElement.textContent = categoryName;
                
                const tagsContainer = document.createElement('div');
                tagsContainer.className = 'tags-container';
                
                // Рендерим теги этой категории
                category.tags.forEach(tag => {
                    const tagElement = document.createElement('div');
                    tagElement.className = `tag ${selectedTags.includes(tag) ? 'selected' : ''}`;
                    tagElement.textContent = tag;
                    tagElement.onclick = () => toggleTag(gameName, tag);
                    tagsContainer.appendChild(tagElement);
                });
                
                categoryElement.appendChild(titleElement);
                categoryElement.appendChild(tagsContainer);
                container.appendChild(categoryElement);
            });
        }

        function toggleTag(gameName, tag) {
            if (!gameTags[gameName]) {
                gameTags[gameName] = [];
            }

            if (gameTags[gameName].includes(tag)) {
                // Убираем тег
                gameTags[gameName] = gameTags[gameName].filter(t => t !== tag);
            } else {
                // Добавляем тег
                gameTags[gameName].push(tag);
            }

            renderTagCategories(gameName);
        }

        function nextGame() {
            currentIndex++;
            if (currentIndex < allGames.length) {
                loadGame(currentIndex);
            } else {
                loadGame(currentIndex);
            }
        }

        function skipGame() {
            currentIndex++;
            if (currentIndex < allGames.length) {
                loadGame(currentIndex);
            } else {
                loadGame(currentIndex);
            }
        }

        function skipAsUnknown() {
            const currentGame = allGames[currentIndex];
            unknownGames.push(currentGame.name);
            updateUnknownCounter();
            
            currentIndex++;
            if (currentIndex < allGames.length) {
                loadGame(currentIndex);
            } else {
                loadGame(currentIndex);
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / allGames.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = 
                `Прогресс: ${currentIndex + 1} из ${allGames.length} игр (${Math.round(progress)}%)`;
        }

        function updateUnknownCounter() {
            document.getElementById('skipped-counter').textContent = 
                `Неизвестных игр: ${unknownGames.length}`;
        }

        function downloadJSON() {
            const dataStr = JSON.stringify(gameTags, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'game-tags.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert(`✅ game-tags.json скачан! (${Object.keys(gameTags).length} игр размечено)\n❓ Неизвестных игр: ${unknownGames.length}`);
        }

        // Запускаем при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadGames);
    </script>
</body>
</html>
